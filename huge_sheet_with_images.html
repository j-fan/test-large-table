<!DOCTYPE html>
<html>
<head>
<title>Large Sheet with Images for Paste Testing</title>
<style>
table { border-collapse: collapse; }
td { border: 1px solid #ccc; padding: 4px; min-width: 80px; }
img { width: 200px; height: 200px; }
</style>
</head>
<body>
<h2>Select All (Cmd+A) then Copy (Cmd+C), then paste into Canva</h2>
<table>
<script>
// Generate a 50 rows x 10 columns table with images in every 3rd cell
const rows = 500;
const cols = 10;
// Use placeholder images of varying sizes to stress memory
const imgSizes = [400, 600, 800, 1000, 1200];
let html = '';
for (let r = 0; r < rows; r++) {
  html += '<tr>';
  for (let c = 0; c < cols; c++) {
    if ((r * cols + c) % 3 === 0) {
      const size = imgSizes[(r + c) % imgSizes.length];
      // Each image is a unique URL to prevent browser caching from helping
      html += `<td><img src="https://picsum.photos/${size}/${size}?random=${r}_${c}" alt="img_${r}_${c}"><br>Cell ${r},${c}</td>`;
    } else {
      html += `<td>Data row=${r} col=${c} ${'x'.repeat(50)}</td>`;
    }
  }
  html += '</tr>';
}
document.currentScript.parentElement.innerHTML += html;
</script>
</table>
</body>
</html>
