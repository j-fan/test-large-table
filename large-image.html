<!DOCTYPE html>
<html>
<head>
<title>Large Image Generator</title>
<style>
  body { font-family: sans-serif; padding: 24px; }
  label { font-size: 16px; }
  input[type=number] { font-size: 16px; padding: 8px; width: 100px; margin: 0 8px; border: 1px solid #ccc; border-radius: 6px; }
  button { padding: 12px 24px; font-size: 18px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 12px; display: block; }
  button:hover { background: #3a7bc8; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 16px; color: #333; }
</style>
</head>
<body>
<h2>Large Image Generator</h2>
<p>Generates a large PNG using a canvas element filled with noise.</p>
<label>
  Size (MB):
  <input type="number" id="sizeMb" value="200" min="1" max="2000" />
</label>
<button id="generateBtn">Generate image</button>
<div id="status"></div>
<canvas id="canvas" style="display:none"></canvas>
<script>
const status = document.getElementById('status');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function generateAndRender(targetMB) { return new Promise(resolve => {
  status.textContent = `Generating ~${targetMB}MB image...`;

  // Each pixel is 4 bytes (RGBA). pixels = targetMB * 1024 * 1024 / 4
  const pixels = (targetMB * 1024 * 1024) / 4;
  const side = Math.floor(Math.sqrt(pixels));
  canvas.width = side;
  canvas.height = side;

  // Fill with noise so PNG compression doesn't significantly reduce in-memory size
  const imageData = ctx.createImageData(side, side);
  const buf = new Uint32Array(imageData.data.buffer);
  for (let i = 0; i < buf.length; i++) {
    buf[i] = 0xff000000 | (Math.random() * 0xffffff);
  }
  ctx.putImageData(imageData, 0, 0);

  status.textContent = `Canvas drawn (${side}×${side}px = ~${targetMB}MB uncompressed). Converting to PNG...`;

  canvas.toBlob(async (blob) => {
    const sizeMB = (blob.size / 1024 / 1024).toFixed(1);
    const url = URL.createObjectURL(blob);

    const existing = document.getElementById('preview');
    if (existing) existing.remove();
    const container = document.createElement('div');
    container.id = 'preview';
    container.style.marginTop = '16px';
    container.innerHTML = `
      <p><strong>PNG rendered below (${sizeMB}MB).</strong><br>
      Long-press the image and select <em>Copy Image</em>, then paste into your app.</p>
      <img src="${url}" style="max-width:300px;border:1px solid #ccc;" />
      <br><br>
      <a href="${url}" download="large-${targetMB}mb.png" style="font-size:16px;">Download instead</a>
    `;
    document.body.appendChild(container);
    status.textContent = `Done — scroll down to see the image.`;
    resolve();
  }, 'image/png');
}); }

document.getElementById('generateBtn').addEventListener('click', () => {
  const targetMB = parseInt(document.getElementById('sizeMb').value, 10);
  if (!targetMB || targetMB < 1) {
    status.textContent = 'Please enter a valid size in MB.';
    return;
  }
  const btn = document.getElementById('generateBtn');
  btn.textContent = 'Generating…';
  btn.disabled = true;
  // Defer heavy work so the button update renders before the main thread is blocked
  setTimeout(() => {
    generateAndRender(targetMB).finally(() => {
      btn.textContent = 'Generate image';
      btn.disabled = false;
    });
  }, 0);
});
</script>
</body>
</html>
